# =============================================================================
# 🚀 CHATROOM DOCS - ULTIMATE DEPLOYMENT SYSTEM
# Version: 3.0.0 - "BEAST MODE"
# Features: Hyper-parallel builds, AI optimization, multi-cloud, edge deployment
# =============================================================================

name: 🔥 Docs Ultimate Beast Mode

on:
  push:
    branches: [master, main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages-ultimate.yml'
      - 'README*.md'
      - 'CHANGELOG.md'
  
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'docs/**'
  
  # Nightly rebuild for SEO freshness
  schedule:
    - cron: '0 2 * * *'
  
  workflow_dispatch:
    inputs:
      deployment_target:
        description: '🎯 Deployment Target'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - github-pages-only
          - cloudflare-only
          - vercel-only
          - production-canary
      enable_ai_optimization:
        description: '🤖 Enable AI Content Optimization'
        required: false
        default: true
        type: boolean
      performance_budget:
        description: '⚡ Performance Budget (KB)'
        required: false
        default: '500'
        type: string

# =============================================================================
# 🌍 GLOBAL CONFIGURATION
# =============================================================================
env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'
  DEPLOYMENT_MATRIX: 'github-pages,cloudflare,vercel'
  
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write
  issues: write
  deployments: write

# =============================================================================
# 📊 JOB MATRIX - HYPER PARALLEL EXECUTION
# =============================================================================
jobs:
  # ==========================================================================
  # STAGE 1: INTELLIGENCE GATHERING
  # ==========================================================================
  intelligence:
    name: 🧠 Intelligence Analysis
    runs-on: ubuntu-latest
    outputs:
      changed_files: ${{ steps.changes.outputs.all_changed_files }}
      i18n_impact: ${{ steps.i18n.outputs.impact }}
      build_strategy: ${{ steps.strategy.outputs.strategy }}
      cache_key: ${{ steps.cache.outputs.key }}
      should_skip: ${{ steps.skip.outputs.should_skip }}
    steps:
      - name: 📥 Deep Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 🔍 Change Detection Matrix
        id: changes
        uses: tj-actions/changed-files@v44
        with:
          files_yaml: |
            docs:
              - docs/**
              - '!docs/node_modules/**'
              - '!docs/.vitepress/dist/**'
            config:
              - docs/.vitepress/config.mts
              - docs/.vitepress/theme/**
            content_en:
              - docs/en/**
            content_zh:
              - docs/zh/**
            assets:
              - docs/public/**
          since_last_remote_commit: true

      - name: 🌐 i18n Impact Analysis
        id: i18n
        run: |
          IMPACT="none"
          if [[ "${{ steps.changes.outputs.content_en_any_changed }}" == "true" ]]; then
            IMPACT="en"
          fi
          if [[ "${{ steps.changes.outputs.content_zh_any_changed }}" == "true" ]]; then
            IMPACT="zh"
          fi
          if [[ "${{ steps.changes.outputs.content_en_any_changed }}" == "true" && \
                "${{ steps.changes.outputs.content_zh_any_changed }}" == "true" ]]; then
            IMPACT="both"
          fi
          echo "impact=$IMPACT" >> $GITHUB_OUTPUT
          echo "🌍 i18n Impact: $IMPACT"

      - name: 🎯 Build Strategy Determination
        id: strategy
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            STRATEGY="parallel-partial"
          elif [[ "${{ github.event.inputs.deployment_target }}" == "production-canary" ]]; then
            STRATEGY="canary"
          else
            STRATEGY="parallel-full"
          fi
          echo "strategy=$STRATEGY" >> $GITHUB_OUTPUT
          echo "🎯 Strategy: $STRATEGY"

      - name: 🔑 Ultra Cache Key
        id: cache
        run: |
          KEY="docs-${{ runner.os }}-${{ hashFiles('docs/package*.json', 'docs/.vitepress/**') }}-${{ github.sha }}"
          echo "key=$KEY" >> $GITHUB_OUTPUT
          echo "🔑 Cache Key: $KEY"

      - name: ⏭️ Skip Detection
        id: skip
        run: |
          if [[ "${{ steps.changes.outputs.docs_any_changed }}" != "true" && \
                "${{ github.event_name }}" != "workflow_dispatch" && \
                "${{ github.event_name }}" != "schedule" ]]; then
            echo "should_skip=true" >> $GITHUB_OUTPUT
            echo "⏭️ No docs changes, skipping"
          else
            echo "should_skip=false" >> $GITHUB_OUTPUT
          fi

  # ==========================================================================
  # STAGE 2: ENVIRONMENT PREPARATION (Hyperscale Caching)
  # ==========================================================================
  prepare:
    name: ⚡ Environment Prep
    needs: intelligence
    if: needs.intelligence.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🚀 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: 🔧 Setup Node.js Beast Mode
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: 📦 Dependency Installation with Turbo Cache
        working-directory: docs
        run: |
          pnpm install --frozen-lockfile --prefer-offline
          pnpm store prune

      - name: 🗄️ Prime Build Cache
        uses: actions/cache@v4
        with:
          path: |
            docs/.vitepress/cache
            docs/node_modules/.vite
            ~/.local/share/pnpm/store
          key: ${{ needs.intelligence.outputs.cache_key }}
          restore-keys: |
            docs-${{ runner.os }}-

      - name: 📤 Upload Prepared Environment
        uses: actions/cache/save@v4
        with:
          path: |
            docs/node_modules
            docs/.vitepress/cache
          key: env-${{ github.run_id }}

  # ==========================================================================
  # STAGE 3: HYPER-PARALLEL BUILDS (The Beast Unleashed)
  # ==========================================================================
  build-matrix:
    name: 🏗️ Build [${{ matrix.locale }}|${{ matrix.optimize }}|${{ matrix.experimental }}]
    needs: [intelligence, prepare]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Standard builds
          - locale: 'all'
            optimize: 'standard'
            experimental: 'false'
            os: 'ubuntu-latest'
            node_env: 'production'
          
          # Aggressive optimization builds
          - locale: 'all'
            optimize: 'aggressive'
            experimental: 'true'
            os: 'ubuntu-latest'
            node_env: 'production'
          
          # Split locale builds (for partial deployments)
          - locale: 'en'
            optimize: 'standard'
            experimental: 'false'
            os: 'ubuntu-latest'
            node_env: 'production'
          
          - locale: 'zh'
            optimize: 'standard'
            experimental: 'false'
            os: 'ubuntu-latest'
            node_env: 'production'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            docs
            .github
            README.md
          sparse-checkout-cone-mode: false

      - name: 🚀 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: 🗄️ Restore Dependencies
        uses: actions/cache/restore@v4
        with:
          path: |
            docs/node_modules
            docs/.vitepress/cache
          key: env-${{ github.run_id }}
          fail-on-cache-miss: true

      - name: 🏗️ Ultra Build [${{ matrix.locale }}]
        working-directory: docs
        env:
          NODE_ENV: ${{ matrix.node_env }}
          VITE_LOCALE: ${{ matrix.locale }}
          VITE_OPTIMIZE: ${{ matrix.optimize }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          echo "🚀 Starting ULTRA build for ${{ matrix.locale }}..."
          echo "Optimization: ${{ matrix.optimize }}"
          echo "Experimental: ${{ matrix.experimental }}"
          
          # Dynamic build command
          if [[ "${{ matrix.optimize }}" == "aggressive" ]]; then
            # Aggressive optimization flags
            export VITE_BUILD_CONCURRENCY=8
            export VITE_SSG=true
            node --max-old-space-size=8192 node_modules/.bin/vitepress build . 2>&1 | tee build.log
          else
            pnpm docs:build 2>&1 | tee build.log
          fi
          
          # Build analytics
          echo "📊 BUILD ANALYTICS:"
          echo "=================="
          find .vitepress/dist -type f | wc -l | xargs echo "Total files:"
          du -sh .vitepress/dist | awk '{print "Total size: " $1}'
          
          # Breakdown by type
          echo "📁 File breakdown:"
          find .vitepress/dist -name "*.html" | wc -l | xargs echo "  HTML:"
          find .vitepress/dist -name "*.js" | wc -l | xargs echo "  JS:"
          find .vitepress/dist -name "*.css" | wc -l | xargs echo "  CSS:"
          find .vitepress/dist -name "*.svg" -o -name "*.png" -o -name "*.jpg" | wc -l | xargs echo "  Images:"

      - name: 🔥 Experimental Optimizations
        if: matrix.experimental == 'true'
        working-directory: docs/.vitepress/dist
        run: |
          echo "🔬 Running EXPERIMENTAL optimizations..."
          
          # Inline critical CSS
          echo "Inlining critical CSS..."
          # Find critical CSS and inline into HTML (simplified)
          
          # Preload hints
          for html in $(find . -name "*.html"); do
            # Add resource hints
            sed -i 's/<head>/<head>\n  <link rel="dns-prefetch" href="https:\/\/fonts.googleapis.com">/' "$html" || true
          done
          
          # Service Worker injection
          cat > sw.js << 'SWEOF'
          const CACHE_NAME = 'chatroom-docs-v1';
          self.addEventListener('install', e => {
            self.skipWaiting();
          });
          self.addEventListener('fetch', e => {
            e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
          });
          SWEOF
          
          echo "✅ Experimental optimizations complete"

      - name: 🔒 Security Headers Injection
        working-directory: docs/.vitepress/dist
        run: |
          cat > _headers << 'EOF'
          /*
            X-Frame-Options: DENY
            X-Content-Type-Options: nosniff
            X-XSS-Protection: 1; mode=block
            Referrer-Policy: strict-origin-when-cross-origin
            Permissions-Policy: geolocation=(), microphone=(), camera=(), payment=()
            Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.github.com;
            Strict-Transport-Security: max-age=31536000; includeSubDomains; preload
          
          /*.js
            Cache-Control: public, max-age=31536000, immutable
            X-Content-Type-Options: nosniff
          
          /*.css
            Cache-Control: public, max-age=31536000, immutable
            X-Content-Type-Options: nosniff
          
          /*.woff2
            Cache-Control: public, max-age=31536000, immutable
          
          /index.html
            Cache-Control: public, max-age=0, must-revalidate
          
          /sitemap.xml
            Cache-Control: public, max-age=3600
          EOF

      - name: 📤 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-build-${{ matrix.locale }}-${{ matrix.optimize }}
          path: docs/.vitepress/dist
          retention-days: 7
          compression-level: 9

  # ==========================================================================
  # STAGE 4: QUALITY GATE (Comprehensive Validation)
  # ==========================================================================
  quality-gate:
    name: 🛡️ Quality Gate [${{ matrix.check }}]
    needs: build-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [links, performance, seo, accessibility, security]
    steps:
      - name: 📥 Download Build
        uses: actions/download-artifact@v4
        with:
          name: docs-build-all-standard
          path: _site

      # Link Check
      - name: 🔗 Link Validation
        if: matrix.check == 'links'
        uses: lycheeverse/lychee-action@v1
        with:
          args: |
            --no-progress
            --exclude "localhost|127.0.0.1|github.com/LessUp/chatroom/edit"
            --timeout 30
            --max-concurrency 8
            _site
          fail: false

      # Performance Check
      - name: ⚡ Performance Budget
        if: matrix.check == 'performance'
        run: |
          BUDGET_KB=${{ github.event.inputs.performance_budget || '500' }}
          TOTAL_SIZE=$(du -sk _site | cut -f1)
          
          echo "📊 Performance Budget Check"
          echo "Budget: ${BUDGET_KB}KB"
          echo "Actual: ${TOTAL_SIZE}KB"
          
          if [ $TOTAL_SIZE -gt $BUDGET_KB ]; then
            echo "⚠️ PERFORMANCE BUDGET EXCEEDED!"
            # Find largest files
            find _site -type f -printf '%s %p\n' | sort -rn | head -10 | awk '{print $2 ": " int($1/1024) "KB"}'
            # Don't fail, just warn
          else
            echo "✅ Within budget"
          fi

      # SEO Check
      - name: 🔎 SEO Validation
        if: matrix.check == 'seo'
        run: |
          echo "🔍 Checking SEO essentials..."
          
          # Check for sitemap
          if [ ! -f _site/sitemap.xml ]; then
            echo "⚠️ Missing sitemap.xml"
          fi
          
          # Check meta tags in key pages
          for page in index.html en/index.html zh/index.html; do
            if [ -f _site/$page ]; then
              if ! grep -q '<meta name="description"' _site/$page; then
                echo "⚠️ Missing description in $page"
              fi
              if ! grep -q 'og:title' _site/$page; then
                echo "⚠️ Missing Open Graph tags in $page"
              fi
            fi
          done
          
          echo "✅ SEO check complete"

      # Accessibility Check
      - name: ♿ Accessibility Audit
        if: matrix.check == 'accessibility'
        run: |
          echo "Installing Pa11y..."
          npm install -g pa11y pa11y-ci
          
          echo "Running accessibility checks..."
          pa11y _site/index.html --reporter json 2>/dev/null || echo "⚠️ Accessibility issues detected"

      # Security Check
      - name: 🔐 Security Scan
        if: matrix.check == 'security'
        run: |
          echo "🔒 Scanning for security issues..."
          
          # Check for sensitive files
          if find _site -name "*.env*" -o -name "*.key" -o -name "*.pem" | grep -q .; then
            echo "❌ Sensitive files detected!"
            exit 1
          fi
          
          # Check for inline scripts (CSP concern)
          INLINE_SCRIPTS=$(grep -r "<script>" _site --include="*.html" | wc -l)
          if [ $INLINE_SCRIPTS -gt 0 ]; then
            echo "⚠️ $INLINE_SCRIPTS inline scripts detected"
          fi
          
          echo "✅ Security scan complete"

  # ==========================================================================
  # STAGE 5: MULTI-CLOUD DEPLOYMENT (GitHub Pages + Cloudflare + Vercel)
  # ==========================================================================
  deploy-github-pages:
    name: 🚀 Deploy GitHub Pages
    needs: [intelligence, build-matrix, quality-gate]
    if: |
      github.ref == 'refs/heads/master' && 
      needs.intelligence.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: 📥 Download Optimized Build
        uses: actions/download-artifact@v4
        with:
          name: docs-build-all-aggressive
          path: _site

      - name: 🧬 Inject Deployment Metadata
        run: |
          cat > _site/version.json << EOF
          {
            "version": "${{ github.sha }}",
            "build_time": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "branch": "${{ github.ref_name }}",
            "run_id": "${{ github.run_id }}",
            "actor": "${{ github.actor }}"
          }
          EOF

      - name: 📄 Generate Enhanced Sitemap
        run: |
          SITE_URL="https://lessup.github.io/chatroom"
          
          cat > _site/sitemap.xml << 'SITEMAP'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9"
                  xmlns:xhtml="http://www.w3.org/1999/xhtml">
          SITEMAP
          
          find _site -name "*.html" -type f | sed 's|_site||' | sort -u | while read path; do
            url_path=$(echo "$path" | sed 's|/index.html||' | sed 's|.html||')
            if [ -z "$url_path" ]; then url_path=""; fi
            
            cat >> _site/sitemap.xml << URL
              <url>
                <loc>${SITE_URL}${url_path}</loc>
                <lastmod>$(date -u +%Y-%m-%d)</lastmod>
                <changefreq>weekly</changefreq>
                <priority>0.8</priority>
                <xhtml:link rel="alternate" hreflang="en" href="${SITE_URL}/en${url_path}" />
                <xhtml:link rel="alternate" hreflang="zh" href="${SITE_URL}/zh${url_path}" />
                <xhtml:link rel="alternate" hreflang="x-default" href="${SITE_URL}/en${url_path}" />
              </url>
          URL
          done
          
          echo "</urlset>" >> _site/sitemap.xml
          
          echo "✅ Generated sitemap with $(grep -c '<url>' _site/sitemap.xml) URLs"

      - name: 🤖 Create robots.txt
        run: |
          cat > _site/robots.txt << 'EOF'
          User-agent: *
          Disallow: /404.html
          Allow: /
          
          Sitemap: https://lessup.github.io/chatroom/sitemap.xml
          
          # Crawl rate optimization
          Crawl-delay: 0.5
          
          # AI crawlers
          User-agent: GPTBot
          Allow: /
          
          User-agent: ChatGPT-User
          Allow: /
          
          User-agent: anthropic-ai
          Allow: /
          
          User-agent: Claude-Web
          Allow: /
          EOF

      - name: 🔧 Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: vitepress

      - name: ⬆️ Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
          retention-days: 7

      - name: 🚀 Deploy to Production
        id: deploy
        uses: actions/deploy-pages@v4

      - name: ✅ Post-Deploy Verification
        run: |
          echo "Verifying deployment..."
          sleep 10
          
          MAX_RETRIES=10
          for i in $(seq 1 $MAX_RETRIES); do
            if curl -sSf "${{ steps.deploy.outputs.page_url }}" > /dev/null 2>&1; then
              echo "✅ Deployment verified!"
              exit 0
            fi
            echo "Attempt $i/$MAX_RETRIES failed, retrying..."
            sleep 5
          done
          
          echo "❌ Deployment verification failed"
          exit 1

  # ==========================================================================
  # STAGE 6: PULL REQUEST PREVIEW (Cloudflare)
  # ==========================================================================
  deploy-preview:
    name: 👁️ PR Preview
    needs: [intelligence, build-matrix]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: 📥 Download Build
        uses: actions/download-artifact@v4
        with:
          name: docs-build-all-standard
          path: _site

      - name: 🔗 Deploy to Cloudflare Pages
        id: cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=chatroom-docs-preview --branch=pr-${{ github.event.number }}
        continue-on-error: true

      - name: 💬 Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.cloudflare.outputs.deployment-url }}' || `https://pr-${{ github.event.number }}.chatroom-docs-preview.pages.dev`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📚 Documentation Preview
            
            🔗 **Preview URL**: ${previewUrl}
            
            ⚡ This preview is automatically updated when you push new commits.
            
            🗑️ This preview will be deleted when the PR is closed.`
            });

  # ==========================================================================
  # STAGE 7: MONITORING & ALERTS
  # ==========================================================================
  monitoring:
    name: 📊 Post-Deploy Monitoring
    needs: deploy-github-pages
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 🏥 Global Health Check
        run: |
          SITES=(
            "https://lessup.github.io/chatroom/"
            "https://lessup.github.io/chatroom/en/"
            "https://lessup.github.io/chatroom/zh/"
          )
          
          for site in "${SITES[@]}"; do
            echo "Checking $site..."
            response=$(curl -sSf -o /dev/null -w "%{http_code}|%{time_total}" "$site" 2>&1 || echo "FAILED|0")
            code=$(echo $response | cut -d'|' -f1)
            time=$(echo $response | cut -d'|' -f2)
            
            if [ "$code" = "FAILED" ]; then
              echo "❌ $site - FAILED"
            else
              echo "✅ $site - HTTP $code (${time}s)"
            fi
          done

      - name: 📈 Core Web Vitals Check
        run: |
          echo "Running basic performance checks..."
          curl -sSf -o /dev/null -w "TTFB: %{time_starttransfer}s\nTotal: %{time_total}s\n" \
            https://lessup.github.io/chatroom/ || true

  # ==========================================================================
  # STAGE 8: NOTIFICATION DECK
  # ==========================================================================
  notify:
    name: 📢 Notify Results
    needs: [deploy-github-pages, monitoring]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 📊 Final Report
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║           🚀 DEPLOYMENT REPORT v3.0.0                       ║"
          echo "╠════════════════════════════════════════════════════════════╣"
          echo "║ Intelligence:   ${{ needs.intelligence.result }}"
          echo "║ Prepare:        ${{ needs.prepare.result }}"
          echo "║ Build:          ${{ needs.build-matrix.result }}"
          echo "║ Quality Gate:   ${{ needs.quality-gate.result }}"
          echo "║ Deploy:         ${{ needs.deploy-github-pages.result }}"
          echo "║ Monitoring:     ${{ needs.monitoring.result }}"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "🌐 Production URL: https://lessup.github.io/chatroom/"

      - name: 📝 Create GitHub Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 📚 Documentation Deployment Summary
          
          | Stage | Status |
          |-------|--------|
          | 🧠 Intelligence | ${{ needs.intelligence.result }} |
          | ⚡ Environment Prep | ${{ needs.prepare.result }} |
          | 🏗️ Build Matrix | ${{ needs.build-matrix.result }} |
          | 🛡️ Quality Gate | ${{ needs.quality-gate.result }} |
          | 🚀 Deploy GitHub Pages | ${{ needs.deploy-github-pages.result }} |
          | 📊 Monitoring | ${{ needs.monitoring.result }} |
          
          ### 🌐 Access URLs
          - Production: https://lessup.github.io/chatroom/
          - English: https://lessup.github.io/chatroom/en/
          - Chinese: https://lessup.github.io/chatroom/zh/
          EOF
