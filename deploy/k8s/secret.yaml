apiVersion: v1
kind: Secret
metadata:
  name: chatroom-secrets
  namespace: chatroom
  labels:
    app.kubernetes.io/name: chatroom
    app.kubernetes.io/component: secrets
type: Opaque
# IMPORTANT: Do NOT commit actual secrets to version control!
# This is a template file. In production, use one of these approaches:
# 1. Generate secrets via kubectl: kubectl create secret generic chatroom-secrets --from-literal=DATABASE_DSN=... --from-literal=JWT_SECRET=...
# 2. Use external secret management: External Secrets Operator, Vault, AWS Secrets Manager
# 3. Use sealed-secrets or SOPS for GitOps workflows
stringData:
  # Example placeholder - NEVER use these values in production
  DATABASE_DSN: "postgres://<user>:<password>@<host>:5432/chatroom?sslmode=require"
  JWT_SECRET: "<generate-with-openssl-rand-base64-32>"
